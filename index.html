      <style>
        /* =========================
   RESET
========================= */
        *,
        *::before,
        *::after {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
          color: inherit;
          text-underline-offset: 2px;
        }

        /* =========================
   OSMO SCALING SYSTEM
   https://osmo.supply/
========================= */
        /* Desktop */
        :root {
          --size-unit: 16; /* body font-size in design - no px */
          --size-container-ideal: 1728; /* screen-size in design - no px */
          --size-container-min: 992px;
          --size-container-max: 1920px;
          --size-container: clamp(
            var(--size-container-min),
            100vw,
            var(--size-container-max)
          );
          --size-font: calc(
            var(--size-container) /
              (var(--size-container-ideal) / var(--size-unit))
          );

          --black: #121212;
          --light: #ffffff;
          --dark: #1e1e1e;
          --grey: #f4f4f4;
          --lightBlue: #1a73e8;
          --dark-grey: #dfdfdf;
          --darker-grey: #6c6c6c;
          --blue: #514cf5;
        }

        /* Tablet */
        @media screen and (max-width: 991px) {
          :root {
            --size-container-ideal: 768;
            --size-container-min: 768px;
            --size-container-max: 991px;
          }
        }

        /* Mobile Landscape */
        @media screen and (max-width: 767px) {
          :root {
            --size-container-ideal: 550;
            --size-container-min: 480px;
            --size-container-max: 767px;
          }
        }

        /* Mobile Portrait */
        @media screen and (max-width: 479px) {
          :root {
            --size-container-ideal: 402;
            --size-container-min: 320px;
            --size-container-max: 479px;
          }
        }

        /* =========================
   BASE
========================= */
        body {
          transition:
            background-color 350ms ease,
            color 350ms ease;
          font-size: var(--size-font);
          color: var(--dark);
        }

        /* Act-driven body state — CSS custom properties cascade from here */
        body[data-act] {
          transition:
            background-color 0.8s cubic-bezier(0.65, 0, 0.35, 1),
            color 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* Theme tokens */
        [data-theme="light"] {
          background-color: var(--grey);
          color: var(--dark);
        }

        [data-theme="grey"] {
          background-color: var(--dark-grey);
          color: var(--dark);
        }

        [data-theme="grey-black"] {
          background-color: var(--grey);
          color: var(--black);
        }

        [data-theme="dark"] {
          background-color: var(--black);
          color: var(--grey);
        }

        [data-theme="white"] {
          background-color: var(--light);
          color: var(--black);
        }

        [data-theme="blue"] {
          background-color: var(--lightBlue);
          color: var(--light);
        }

        [data-theme="saturated"] {
          background-color: var(--blue);
          color: var(--light);
        }

        /* Containers */
        .container {
          max-width: var(--size-container);
        }

        .container.medium {
          max-width: calc(var(--size-container) * 0.85);
        }

        .container.small {
          max-width: calc(var(--size-container) * 0.7);
        }

        /* =========================
   CUSTOM CODE
========================= */
        [class*=" sg-text-"],
        [class^="sg-text-"] {
          color: inherit;
        }

        .hero-top_text-wrap > *,
        .hero-top_text-endwrap > * {
          font-weight: bold;
          text-transform: uppercase;
        }

        .hero-top_text_wrapper-end > * {
          position: relative !important;
        }

        /* SplitText safety */
        [data-split="heading"] {
          visibility: hidden;
        }

        /* Custom Designer/Editor: prevent disappearing */
        .wf-design-mode [data-split="heading"],
        .w-editor [data-split="heading"] {
          visibility: visible !important;
        }

        /* Footer arrow hover */
        .footer-arrow_svg-wrapper {
          transition: all 0.3s ease-in-out !important;
          width: 100%;
        }

        footer .footer-social-link:hover .footer-arrow_svg-wrapper.is--1 {
          top: -50%;
          left: 150%;
        }

        footer .footer-social-link:hover .footer-arrow_svg-wrapper.is--2 {
          top: 50%;
          left: 50%;
        }

        /* =========================
   CANVAS / SHATTER / NOISE
========================= */
        .canvas-plane {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: block;
          pointer-events: none;
          z-index: 100;
        }

        #noise-canvas::before {
          z-index: 1000;
          pointer-events: none;
        }

        [data-shatter-canvas] {
          background: transparent !important;
          display: block;
        }

        [data-shatter-image] {
          opacity: 0;
        }

        @media (max-width: 992px) {
          [data-shatter-image] {
            opacity: 1;
          }
        }

        /* =========================
   DRIP BARS
========================= */
        .drip-bars {
          position: fixed;
          inset: 0;
          pointer-events: none;
          z-index: 200;
          display: flex;
          gap: 0;
        }

        .drip-bar {
          flex: 1;
          height: 0;
          background: var(--black);
          align-self: flex-start;
          will-change: height;
          border-left: 1px solid var(--dark-grey);
        }

        .drip-bar:first-child {
          border-left: none;
        }

        .drip-cap--flat {
          border-radius: 0;
          clip-path: none;
        }

        .drip-cap--rounded {
          border-bottom-left-radius: 1000px;
          border-bottom-right-radius: 1000px;
        }

        .drip-cap--pointy {
          border-radius: 0;
          clip-path: polygon(
            0% 0%,
            100% 0%,
            100% calc(100% - 100px),
            50% 100%,
            0% calc(100% - 100px)
          );
        }

        /* =========================
   PIXEL TRANSITION
========================= */
        .pixel-transition {
          position: fixed;
          inset: 0;
          z-index: 550;
          pointer-events: none;
          display: grid;
          grid-template-columns: repeat(8, 1fr);
          background: transparent;
        }

        .pixel-transition-block {
          background: var(--light);
        }

        /* =========================
   CLOCK / SVG
========================= */
        .light-svg_layout {
          top: -80vh;
        }

        svg.clock-svg {
          width: 100svw;
          height: 100svh;
          overflow: visible;
          opacity: 0.5;
        }

        .clock-ink {
          stroke: var(--dark);
          fill: var(--dark);
        }

        .tick-mark {
          stroke-linecap: butt;
        }

        .hour-text {
          text-anchor: middle;
          dominant-baseline: middle;
          font-weight: bold;
          font-family: "Times New Roman", serif;
        }

        /* =========================
   RESPONSIVE TWEAKS
========================= */
        @media (max-width: 991px) {
          .light-svg_layout {
            top: -100vh;
          }

          .drip-bar:nth-child(n + 7) {
            display: none;
          }
        }

        @media (max-width: 767px) {
          .pixel-transition {
            grid-template-columns: repeat(6, 1fr);
          }

          .drip-bar:nth-child(n + 4) {
            display: none;
          }
        }

        @media (max-width: 479px) {
          .pixel-transition {
            grid-template-columns: repeat(4, 1fr);
          }

          .light-svg_layout {
            top: -80vh;
          }
        }

        /* =========================
   UNDERLINE LINK
========================= */
        [data-underline-link] {
          text-decoration: none;
          position: relative;
        }

        [data-underline-link]::before,
        [data-underline-link="alt"]::before,
        [data-underline-link="alt"]::after {
          content: "";
          position: absolute;
          bottom: -0.0625em;
          left: 0;
          width: 100%;
          height: 0.0625em;
          background-color: currentColor;
          transition: transform 0.5s cubic-bezier(0.625, 0.05, 0, 1);
          transform-origin: right;
          transform: scaleX(0) rotate(0.001deg);
        }

        [data-underline-link="alt"]::before {
          transform-origin: left;
          transform: scaleX(1) rotate(0.001deg);
          transition-delay: 0.3s;
        }

        [data-underline-link="alt"]::after {
          transform-origin: right;
          transform: scaleX(0) rotate(0.001deg);
          transition-delay: 0s;
        }

        @media (hover: hover) and (pointer: fine) {
          [data-hover]:hover [data-underline-link]::before,
          [data-underline-link]:hover::before {
            transform-origin: left;
            transform: scaleX(1) rotate(0.001deg);
          }

          [data-hover]:hover [data-underline-link="alt"]::before,
          [data-underline-link="alt"]:hover::before {
            transform-origin: right;
            transform: scaleX(0) rotate(0.001deg);
            transition-delay: 0s;
          }

          [data-hover]:hover [data-underline-link="alt"]::after,
          [data-underline-link="alt"]:hover::after {
            transform-origin: left;
            transform: scaleX(1) rotate(0.001deg);
            transition-delay: 0.3s;
          }
        }

        /* =========================
   LOADER
========================= */
        .loader-img_wrapper.is--base {
          opacity: 0.2;
        }

        .loader-img_wrapper.is--top {
          -webkit-clip-path: inset(0% 100% 0% 0%);
          clip-path: inset(0% 100% 0% 0%);
        }

        /* =========================
   SCROLLBAR
========================= */
        /* Firefox */
        html,
        body {
          scrollbar-width: none;
        }

        /* Chrome/Edge/Safari */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
          width: 0;
          height: 0;
        }

        /* Hide Watermark Badge */
        .w-custom-badge {
          display: none !important;
          visibility: hidden !important;
          opacity: 0 !important;
          pointer-events: none !important;
        }
      </style>
